"server:query:task-seed-promotion-diagnostics" = "cargo run -p nucleusd -- --bootstrap query task-seed-promotion-diagnostics --project project:nucleus-local"
"server:query:planning-projection-file-write-diagnostics" = "cargo run -p nucleusd -- --bootstrap query planning-projection-file-write-diagnostics --project project:nucleus-local"
