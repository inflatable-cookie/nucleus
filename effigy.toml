"desktop:dev" = "cd apps/desktop && bun run tauri:dev"
"desktop:web:dev" = "cd apps/desktop && bun run dev"
"desktop:check" = "cd apps/desktop && bun run check"
"desktop:build" = "cd apps/desktop && bun run build"
"dev" = [
  { task = "desktop:dev" },
]
"health" = [
  { task = "qa:northstar" },
  { task = "check:rust" },
  { task = "server:build" },
]
"qa" = [
  { task = "qa:docs" },
  { task = "qa:northstar" },
  { task = "check:rust" },
  { task = "test:rust" },
  { task = "server:smoke" },
  { task = "desktop:check" },
]
