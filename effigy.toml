"server:query:planning-capture-publication-diagnostics" = "cargo run -p nucleusd -- --bootstrap query planning-capture-publication-diagnostics --project project:nucleus-local"
"server:query:product-workflow-summary" = "cargo run -p nucleusd -- --bootstrap query product-workflow-summary --project project:nucleus-local"
"server:query:task-workflow-drilldown" = "cargo run -p nucleusd -- --bootstrap query task-workflow-drilldown --project project:nucleus-local --task task:nucleus-local:bootstrap"
"server:query:selected-task-action-readiness" = "cargo run -p nucleusd -- --bootstrap query selected-task-action-readiness --project project:nucleus-local --task task:nucleus-local:bootstrap"
