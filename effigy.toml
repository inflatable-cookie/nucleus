[catalog]
alias = "nucleus"

[docs_policy.indexes.vision]
file = "docs/vision/README.md"
dir = "docs/vision"
section = "Vision Artifacts"
exclude = ["history/**"]

[docs_policy.indexes.roadmaps]
file = "docs/roadmaps/README.md"
dir = "docs/roadmaps"
section = "Index"
exclude = []

[docs_policy.next_actions.roadmaps]
index = "roadmaps"
heading = "## Next Task"
allowlist_file = "docs/policy/vision-next-task-verbs.txt"

[tasks]
"qa:docs:links" = "effigy docs check links README.md AGENTS.md docs/README.md"
"qa:docs:index:vision" = "effigy docs check index --policy-index vision"
"qa:docs:next-action:roadmaps" = "effigy docs check next-action --policy roadmaps"
"qa:docs:agent-defaults" = "effigy docs check forbidden AGENTS.md README.md docs/README.md --forbid '--repo .'"

"qa:docs" = [
  { task = "qa:docs:links" },
  { task = "qa:docs:index:vision" },
  { task = "qa:docs:next-action:roadmaps" },
  { task = "qa:docs:agent-defaults" },
]

"qa:northstar:spine" = "effigy docs check paths README.md AGENTS.md docs/README.md docs/vision/README.md docs/architecture/README.md docs/contracts/README.md docs/specs/README.md docs/roadmaps/README.md docs/logs/README.md docs/policy/internal-writing-style.md docs/policy/vision-next-task-verbs.txt"
"qa:northstar:agent-contract" = "effigy docs check contains AGENTS.md --require 'effigy tasks' --require 'effigy test --plan' --require 'docs/README.md'"
"qa:northstar:readme" = "effigy docs check contains README.md --require 'docs/README.md'"
"qa:northstar:docs-front-door" = "effigy docs check contains docs/README.md --require 'vision/README.md' --require 'architecture/README.md' --require 'contracts/README.md' --require 'roadmaps/README.md' --require 'logs/README.md'"
"qa:northstar:headings" = "effigy docs check headings docs/vision/README.md --require-heading '## Current Vision'"
"qa:northstar" = [
  { task = "qa:northstar:spine" },
  { task = "qa:northstar:agent-contract" },
  { task = "qa:northstar:readme" },
  { task = "qa:northstar:docs-front-door" },
  { task = "qa:northstar:headings" },
]

"check:rust" = "cargo check --workspace"
"test:rust" = "cargo test --workspace"
"server:build" = "cargo build -p nucleusd"
"server:status" = "cargo run -p nucleusd -- --status"
"server:bootstrap" = "cargo run -p nucleusd -- --bootstrap"
"server:smoke" = "cargo run -p nucleusd -- --state target/nucleusd-smoke/nucleus.sqlite --bootstrap"
"server:command-runner:smoke" = "cargo run -p nucleusd -- command-runner smoke"
"server:command-runner:read-only-spawn-smoke" = "cargo run -p nucleusd -- command-runner read-only-spawn-smoke"
"server:command-runner:read-only" = "cargo run -p nucleusd -- command-runner read-only --stdout-limit 8 -- printf nucleus-readonly-effigy"
"server:query:projects" = "cargo run -p nucleusd -- query projects"
"server:query:tasks" = "cargo run -p nucleusd -- query tasks"
"server:query:workspaces" = "cargo run -p nucleusd -- query workspaces"
"server:query:command-evidence" = "cargo run -p nucleusd -- query command-evidence"
"server:query:provider-read-intent" = "cargo run -p nucleusd -- query provider-read-intent"
"server:query:provider-readiness-overview" = "cargo run -p nucleusd -- query provider-readiness-overview"
"server:query:provider-live-read-executor" = "cargo run -p nucleusd -- query provider-live-read-executor"
"server:query:provider-live-read-smoke-evidence" = "cargo run -p nucleusd -- query provider-live-read-smoke-evidence"
"server:query:task-timeline" = "cargo run -p nucleusd -- --bootstrap query task-timeline --task task:nucleus-local:bootstrap"
"server:query:task-readiness" = "cargo run -p nucleusd -- --bootstrap query task-readiness --project project:nucleus-local"
"server:query:planning-task-seeds" = "cargo run -p nucleusd -- --bootstrap query planning-task-seeds --project project:nucleus-local"
"server:query:planning-sessions" = "cargo run -p nucleusd -- --bootstrap query planning-sessions --project project:nucleus-local"
"server:query:accepted-memory" = "cargo run -p nucleusd -- --bootstrap query accepted-memory --project project:nucleus-local"
"server:query:accepted-memory-projection" = "cargo run -p nucleusd -- --bootstrap query accepted-memory-projection --project project:nucleus-local"
"server:query:accepted-memory-projection-writes" = "cargo run -p nucleusd -- --bootstrap query accepted-memory-projection-writes --project project:nucleus-local"
"server:query:accepted-memory-projection-import" = "cargo run -p nucleusd -- --bootstrap query accepted-memory-projection-import --project project:nucleus-local"
"server:query:accepted-memory-projection-import-apply" = "cargo run -p nucleusd -- --bootstrap query accepted-memory-projection-import-apply --project project:nucleus-local"
"server:query:accepted-memory-import-apply-review-diagnostics" = "cargo run -p nucleusd -- --bootstrap query accepted-memory-import-apply-review-diagnostics --project project:nucleus-local"
"server:query:accepted-memory-review-receipt-storage-diagnostics" = "cargo run -p nucleusd -- --bootstrap query accepted-memory-review-receipt-storage-diagnostics --project project:nucleus-local"
"server:query:accepted-memory-active-apply-diagnostics" = "cargo run -p nucleusd -- --bootstrap query accepted-memory-active-apply-diagnostics --project project:nucleus-local"
